name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main ]
  # allow manual trigger
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://manikadahal:$HF_TOKEN@huggingface.co/spaces/manikadahal/Sabina_Chess main
